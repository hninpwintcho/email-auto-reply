version: '3'
services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - ./index.js:/app/index.js
      - ./mailer.js:/app/mailer.js
      - ./api.js:/app/api.js
      - ./test-sender.js:/app/test-sender.js
      - ./package.json:/app/package.json
      - ./template.json:/app/template.json
    ports:
      - "3800:3000"
    depends_on:
      - redis

  redis:
    image: redis:7
